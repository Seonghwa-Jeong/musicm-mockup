<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>로그인 · MUSICM</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="js/purify.min.js"></script>
  <script src="js/amplitude-config.js"></script>
  <script type="module" src="js/amplitude.js"></script>
</head>
<body>
  <header class="site-header"></header>

  <main>
    <div class="auth-wrap">
      <h1>로그인</h1>
      <form id="loginForm">
        <div class="form-group">
          <label>아이디 (이메일)</label>
          <input type="email" class="form-control" id="email" placeholder="musicm@example.com" required/>
        </div>
        <div class="form-group">
          <label>비밀번호</label>
          <input type="password" class="form-control" id="password" required/>
        </div>
        <div style="display:flex; justify-content:space-between; font-size:12px; color:#666; margin:10px 0 20px;">
          <label><input type="checkbox" id="remember"/> 아이디 저장</label>
          <a href="#" onclick="event.preventDefault(); toast('목업 — 비밀번호 찾기');">비밀번호 찾기</a>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">로그인</button>
      </form>
      <div style="text-align:center; margin:20px 0; color:#999; font-size:12px; position:relative;">
        <span style="background:#fff; padding:0 12px; position:relative; z-index:1;">또는 SNS 로그인</span>
        <div style="position:absolute; left:0; right:0; top:50%; height:1px; background:#eee;"></div>
      </div>
      <div style="display:flex; gap:8px; justify-content:center; flex-wrap:nowrap;">
        <button class="btn btn-outline" style="height:44px; flex:1; padding:0 4px; font-size:13px; min-width:0; white-space:nowrap;">💬 카카오</button>
        <button class="btn btn-outline" style="height:44px; flex:1; padding:0 4px; font-size:13px; min-width:0; white-space:nowrap;">📗 네이버</button>
        <button class="btn btn-outline" style="height:44px; flex:1; padding:0 4px; font-size:13px; min-width:0; white-space:nowrap;">🔴 구글</button>
        <button class="btn btn-outline" style="height:44px; flex:1; padding:0 4px; font-size:13px; min-width:0; white-space:nowrap;">🍎 애플</button>
      </div>
      <div style="text-align:center; margin-top:30px; font-size:13px; color:#666;">
        아직 회원이 아니신가요? <a href="signup.html" style="font-weight:700; color:#111;">회원가입</a>
      </div>
    </div>
  </main>

  <footer class="site-footer"></footer>

  <script src="js/data.js"></script>
  <script src="js/common.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const pw = document.getElementById('password').value;
      if (!email || !pw) return;
      // Mock login - no actual auth
      const name = email.split('@')[0];
      MUSICM.setUser({ email, name, joinedAt: new Date().toISOString() });
      AMP.track('[Login] Login Submitted', { method: 'email', email });
      toast('로그인되었습니다');
      setTimeout(() => location.href = 'index.html', 600);
    });
  </script>
</body>
</html>
