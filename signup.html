<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>회원가입 · MUSICM</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="js/purify.min.js"></script>
  <script src="js/amplitude-config.js"></script>
  <script type="module" src="js/amplitude.js"></script>
</head>
<body>
  <header class="site-header"></header>

  <main>
    <div class="auth-wrap">
      <h1>회원가입</h1>

      <div style="background:#fff3e0; border:1px solid #ffcc80; border-radius:6px; padding:16px; margin-bottom:24px; font-size:13px; color:#b26a00;">
        🎁 <strong>신규 가입 혜택</strong><br/>
        가입 즉시 최대 25% 쿠폰 5장 지급 · 첫 구매 시 15% 추가 할인
      </div>

      <form id="signupForm">
        <div class="form-group"><label>이름</label><input class="form-control" id="name" required/></div>
        <div class="form-group"><label>이메일 (아이디)</label><input type="email" class="form-control" id="email" placeholder="musicm@example.com" required/></div>
        <div class="form-group"><label>비밀번호</label><input type="password" class="form-control" id="password" placeholder="8자 이상" minlength="8" required/></div>
        <div class="form-group"><label>비밀번호 확인</label><input type="password" class="form-control" id="password2" required/></div>
        <div class="form-group"><label>휴대폰 번호</label><input class="form-control" id="phone" placeholder="010-0000-0000"/></div>
        <div class="form-group">
          <label>성별</label>
          <div style="display:flex; gap:8px;">
            <label class="btn btn-outline" style="flex:1; cursor:pointer;"><input type="radio" name="gender" value="남" style="display:none;"/>남성</label>
            <label class="btn btn-outline" style="flex:1; cursor:pointer;"><input type="radio" name="gender" value="여" style="display:none;"/>여성</label>
            <label class="btn btn-outline" style="flex:1; cursor:pointer;"><input type="radio" name="gender" value="-" style="display:none;"/>선택안함</label>
          </div>
        </div>
        <div class="form-group"><label>생년월일</label><input type="date" class="form-control" id="birth"/></div>

        <div style="padding:16px; background:#f7f7f7; border-radius:6px; margin:16px 0; font-size:13px;">
          <label style="display:block; margin-bottom:8px;"><input type="checkbox" id="agreeAll"/> <strong>전체 동의</strong></label>
          <label style="display:block; padding-left:16px; color:#666; margin-bottom:4px;"><input type="checkbox" class="agree" required/> 이용약관 동의 (필수)</label>
          <label style="display:block; padding-left:16px; color:#666; margin-bottom:4px;"><input type="checkbox" class="agree" required/> 개인정보 수집·이용 동의 (필수)</label>
          <label style="display:block; padding-left:16px; color:#666; margin-bottom:4px;"><input type="checkbox" class="agree-opt"/> 마케팅 정보 수신 동의 (선택)</label>
          <label style="display:block; padding-left:16px; color:#666;"><input type="checkbox" class="agree-opt"/> 만 14세 이상 확인</label>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg">가입하고 쿠폰 받기</button>
      </form>

      <div style="text-align:center; margin-top:24px; font-size:13px; color:#666;">
        이미 회원이신가요? <a href="login.html" style="font-weight:700; color:#111;">로그인</a>
      </div>
    </div>
  </main>

  <footer class="site-footer"></footer>

  <script src="js/data.js"></script>
  <script src="js/common.js"></script>
  <script>
    document.getElementById('agreeAll').addEventListener('change', (e) => {
      document.querySelectorAll('.agree, .agree-opt').forEach(c => c.checked = e.target.checked);
    });

    document.getElementById('signupForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const pw = document.getElementById('password').value;
      const pw2 = document.getElementById('password2').value;
      if (pw !== pw2) { toast('비밀번호가 일치하지 않습니다'); return; }
      const required = document.querySelectorAll('.agree');
      if (![...required].every(c => c.checked)) { toast('필수 약관에 동의해주세요'); return; }
      MUSICM.setUser({ email, name, joinedAt: new Date().toISOString() });
      AMP.track('[Signup] Signup Completed', { email, name });
      toast('가입이 완료되었습니다. 쿠폰 5장이 발급되었습니다!');
      setTimeout(() => location.href = 'index.html', 800);
    });
  </script>
</body>
</html>
