<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>이벤트 · MUSICM</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="js/purify.min.js"></script>
  <script src="js/amplitude-config.js"></script>
  <script type="module" src="js/amplitude.js"></script>
</head>
<body>
  <header class="site-header"></header>

  <main>
    <div class="container-wide">
      <div id="view"></div>
    </div>
  </main>

  <footer class="site-footer"></footer>

  <script>window.__navActive = 'campaign';</script>
  <script src="js/data.js"></script>
  <script src="js/common.js"></script>
  <script>
    const campId = getQS('id');
    const view = document.getElementById('view');

    if (campId) {
      const c = getCampaign(campId);
      if (!c) {
        setSafeHTML(view, '<div class="empty">이벤트를 찾을 수 없습니다.</div>');
      } else {
        // Collect products for campaign
        let products = [];
        if (c.featuredBrands && c.featuredBrands.length) {
          c.featuredBrands.forEach(bid => { products = products.concat(getProductsByBrand(bid)); });
        } else {
          // e.g. season-off: any product with salePrice
          products = PRODUCTS.filter(p => p.salePrice).slice(0, 40);
        }
        // If running festival - filter to shoes
        if (campId === 'running-festival') products = products.filter(p => p.category === 'shoes');
        products = products.slice(0, 20);

        const featuredBrandsHTML = (c.featuredBrands || []).map(bid => {
          const b = BRAND_MAP[bid]; if (!b) return '';
          return `<a href="brand.html?id=${esc(b.id)}" class="chip">${esc(b.name)}</a>`;
        }).join('');

        const html = `
          <nav class="breadcrumb">
            <span><a href="index.html">홈</a></span>
            <span><a href="campaign.html">이벤트</a></span>
            <span>${esc(c.title)}</span>
          </nav>
          <div class="campaign-hero" style="height:420px;">
            <img src="${esc(c.hero)}" alt="${esc(c.title)}"/>
            <div class="overlay">
              <div style="font-size:13px; letter-spacing:2px; opacity:0.9;">${esc(c.tagline || '')}</div>
              <h1>${esc(c.title)}</h1>
              <p class="tag">${esc(c.subtitle)}</p>
              <p class="period">${esc(c.period)}</p>
            </div>
          </div>

          <div style="background:#f7f7f7; padding:24px; border-radius:8px; margin-bottom:30px; font-size:14px; line-height:1.7;">
            ${esc(c.desc)}
          </div>

          ${featuredBrandsHTML ? `
            <div style="margin-bottom:30px;">
              <h3 style="font-size:16px; font-weight:800; margin:0 0 12px;">참여 브랜드</h3>
              <div style="display:flex; gap:8px; flex-wrap:wrap;">${featuredBrandsHTML}</div>
            </div>
          ` : ''}

          <h3 style="font-size:20px; font-weight:800; margin:0 0 20px;">이벤트 상품 ${products.length}개</h3>
          <div class="product-grid" id="campGrid"></div>
        `;
        setSafeHTML(view, html);
        setSafeHTML(document.getElementById('campGrid'), products.map(productCardHTML).join(''));
        AMP.track('[Campaign] Campaign Viewed', {
          campaign_id: c.id, title: c.title, product_count: products.length,
        });
        document.getElementById('campGrid').addEventListener('click', (e) => {
          const card = e.target.closest('.product-card');
          if (!card) return;
          const m = (card.getAttribute('href') || '').match(/id=(\d+)/);
          if (!m) return;
          AMP.track('[Campaign] Campaign Product Clicked', {
            campaign_id: c.id, product_id: Number(m[1]),
          });
        });
      }
    } else {
      // List all campaigns
      let html = `
        <nav class="breadcrumb">
          <span><a href="index.html">홈</a></span>
          <span>이벤트</span>
        </nav>
        <h1 class="page-title">진행 중인 이벤트</h1>
        <p class="page-sub">MUSICM의 다양한 프로모션과 특가 기회를 놓치지 마세요.</p>

        <div class="campaign-grid">
          ${CAMPAIGNS.map(c => `
            <a href="campaign.html?id=${esc(c.id)}" class="campaign-card" style="aspect-ratio:16/10;">
              <img src="${esc(c.hero)}" alt="${esc(c.title)}"/>
              <div class="content">
                <span class="period-tag">${esc(c.period)}</span>
                <h4>${esc(c.title)}</h4>
                <p>${esc(c.subtitle)}</p>
              </div>
            </a>
          `).join('')}
        </div>
      `;
      setSafeHTML(view, html);
      AMP.track('[Campaign] Campaign List Viewed', { campaign_count: CAMPAIGNS.length });
    }
  </script>
</body>
</html>
