<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>마이페이지 · MUSICM</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="js/purify.min.js"></script>
  <script src="js/amplitude-config.js"></script>
  <script type="module" src="js/amplitude.js"></script>
</head>
<body>
  <header class="site-header"></header>

  <main>
    <div class="container">
      <h1 class="page-title">마이페이지</h1>
      <div id="view"></div>
    </div>
  </main>

  <footer class="site-footer"></footer>

  <script src="js/data.js"></script>
  <script src="js/common.js"></script>
  <script>
    const user = MUSICM.getUser();
    const tab = getQS('tab') || 'home';
    const view = document.getElementById('view');

    if (!user) {
      setSafeHTML(view, `
        <div class="empty">
          <p>로그인이 필요한 서비스입니다.</p>
          <a href="login.html" class="btn btn-primary">로그인</a>
        </div>
      `);
    } else {
      const orders = MUSICM.getOrders();
      const wishlist = MUSICM.getWishlist();
      const cart = MUSICM.getCart();

      const sideNav = `
        <nav class="mp-side">
          <h4>쇼핑 정보</h4>
          <a href="mypage.html" class="${tab==='home'?'active':''}">홈</a>
          <a href="mypage.html?tab=orders" class="${tab==='orders'?'active':''}">주문/배송</a>
          <a href="mypage.html?tab=wish" class="${tab==='wish'?'active':''}">찜한 상품 (${wishlist.length})</a>
          <a href="cart.html">장바구니 (${cart.length})</a>
          <a href="mypage.html?tab=review" class="${tab==='review'?'active':''}">리뷰 관리</a>
          <h4>활동 정보</h4>
          <a href="mypage.html?tab=coupon" class="${tab==='coupon'?'active':''}">쿠폰함</a>
          <a href="mypage.html?tab=point" class="${tab==='point'?'active':''}">적립금</a>
          <h4>내 정보</h4>
          <a href="mypage.html?tab=profile" class="${tab==='profile'?'active':''}">프로필 관리</a>
          <a href="mypage.html?tab=addr" class="${tab==='addr'?'active':''}">배송지 관리</a>
          <a href="#" onclick="event.preventDefault(); if(confirm('로그아웃 하시겠습니까?')){ MUSICM.logout(); location.href='index.html'; }">로그아웃</a>
        </nav>
      `;

      let content = '';
      if (tab === 'home') {
        content = `
          <div class="mp-profile">
            <div class="avatar">${esc((user.name || 'U')[0].toUpperCase())}</div>
            <div>
              <div style="font-size:18px; font-weight:800;">${esc(user.name)} 님</div>
              <div class="muted" style="font-size:13px;">${esc(user.email)} · MUSICM VIP</div>
              <div style="margin-top:6px; font-size:12px; color:#ff2a2a; font-weight:700;">다음 등급까지 ${(100000).toLocaleString()}원</div>
            </div>
          </div>
          <div class="mp-cards">
            <div class="card"><div class="num">${orders.length}</div><div class="label">주문</div></div>
            <div class="card"><div class="num">${cart.length}</div><div class="label">장바구니</div></div>
            <div class="card"><div class="num">${wishlist.length}</div><div class="label">찜</div></div>
            <div class="card"><div class="num">5</div><div class="label">쿠폰</div></div>
          </div>
          <h3 style="font-size:16px; font-weight:800; margin-bottom:12px;">최근 주문</h3>
          ${orders.length ? `
            <table>
              <thead><tr><th>주문번호</th><th>주문일</th><th>상품</th><th>결제금액</th><th>상태</th></tr></thead>
              <tbody>
                ${orders.slice(0, 5).map(o => `
                  <tr>
                    <td>${esc(o.id)}</td>
                    <td>${esc(o.date.slice(0,10))}</td>
                    <td>${esc(o.items[0].name)}${o.items.length > 1 ? ` 외 ${o.items.length-1}건` : ''}</td>
                    <td>${formatPrice(o.total)}</td>
                    <td><span style="color:#1f8f44; font-weight:700;">${esc(o.status)}</span></td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          ` : '<p class="muted">아직 주문 내역이 없습니다.</p>'}
        `;
      } else if (tab === 'orders') {
        content = `
          <h3 style="font-size:18px; margin-bottom:20px;">주문 / 배송 조회</h3>
          ${orders.length === 0 ? '<p class="muted">주문 내역이 없습니다.</p>' : orders.map(o => `
            <div style="border:1px solid #eee; border-radius:8px; padding:20px; margin-bottom:16px;">
              <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
                <div><strong>${esc(o.id)}</strong> <span class="muted" style="font-size:12px;">· ${esc(o.date.slice(0,10))}</span></div>
                <div style="color:#1f8f44; font-weight:700;">${esc(o.status)}</div>
              </div>
              ${o.items.map(it => `
                <div style="display:flex; gap:12px; padding:8px 0;">
                  <img src="${esc(it.image)}" style="width:60px; aspect-ratio:5/6; object-fit:cover; border-radius:4px;"/>
                  <div style="flex:1;">
                    <div style="font-size:12px; color:#666; font-weight:700;">${esc(it.brand)}</div>
                    <div>${esc(it.name)}</div>
                    <div class="muted" style="font-size:12px;">${esc(it.color || '')}${it.size ? ` / ${esc(it.size)}` : ''} · ${it.qty}개</div>
                  </div>
                  <div style="font-weight:700;">${formatPrice(it.unitPrice * it.qty)}</div>
                </div>
              `).join('')}
              <div style="padding-top:12px; margin-top:12px; border-top:1px solid #f0f0f0; display:flex; justify-content:space-between;">
                <span>결제 금액</span><strong style="color:#ff2a2a;">${formatPrice(o.total)}</strong>
              </div>
              <div style="display:flex; gap:8px; margin-top:12px;">
                <button class="btn btn-outline" style="flex:1;" onclick="toast('배송 조회 (목업)')">배송 조회</button>
                <button class="btn btn-outline" style="flex:1;" onclick="toast('교환/반품 신청 (목업)')">교환/반품</button>
                <button class="btn btn-outline" style="flex:1;" onclick="toast('리뷰 작성 (목업)')">리뷰 쓰기</button>
              </div>
            </div>
          `).join('')}
        `;
      } else if (tab === 'wish') {
        const wishProducts = wishlist.map(id => getProduct(id)).filter(Boolean);
        content = `
          <h3 style="font-size:18px; margin-bottom:20px;">찜한 상품 ${wishlist.length}개</h3>
          ${wishProducts.length === 0 ? '<p class="muted">아직 찜한 상품이 없습니다.</p>' : `<div class="product-grid-4" id="wishGrid">${wishProducts.map(productCardHTML).join('')}</div>`}
        `;
      } else if (tab === 'coupon') {
        content = `
          <h3 style="font-size:18px; margin-bottom:20px;">쿠폰함</h3>
          <div style="display:grid; grid-template-columns:repeat(2,1fr); gap:16px;">
            ${[
              ['25%','신규 가입 환영 쿠폰','전체 상품 / 최대 15,000원','2026-05-22까지'],
              ['15%','첫 구매 할인 쿠폰','전체 상품 / 최대 20,000원','2026-05-22까지'],
              ['10%','Nike Week 쿠폰','나이키 브랜드 전용','2026-04-28까지'],
              ['5,000원','MUSICM Standard 웰컴','자체브랜드 / 3만원 이상','2026-06-30까지'],
              ['무료배송','무료배송 쿠폰','전체 상품','2026-05-22까지'],
            ].map(([d,t,cond,exp]) => `
              <div style="border:1px dashed #ff2a2a; border-radius:8px; padding:20px; display:flex; gap:16px; align-items:center;">
                <div style="font-size:22px; font-weight:900; color:#ff2a2a; min-width:80px;">${esc(d)}</div>
                <div style="flex:1;">
                  <div style="font-weight:700;">${esc(t)}</div>
                  <div class="muted" style="font-size:12px;">${esc(cond)}</div>
                  <div class="muted" style="font-size:11px;">${esc(exp)}</div>
                </div>
              </div>
            `).join('')}
          </div>
        `;
      } else if (tab === 'point') {
        content = `
          <h3 style="font-size:18px; margin-bottom:20px;">적립금</h3>
          <div style="background:#111; color:#fff; padding:32px; border-radius:8px; text-align:center;">
            <div style="opacity:0.8; font-size:13px;">사용 가능 적립금</div>
            <div style="font-size:36px; font-weight:900; margin-top:8px;">${(3500).toLocaleString()}P</div>
          </div>
          <h4 style="margin:30px 0 12px;">적립 내역</h4>
          <table>
            <thead><tr><th>일자</th><th>내용</th><th>적립/사용</th><th>잔액</th></tr></thead>
            <tbody>
              <tr><td>2026-04-20</td><td>회원가입 축하 적립금</td><td style="color:#1f8f44;">+ 3,000P</td><td>3,500P</td></tr>
              <tr><td>2026-04-18</td><td>리뷰 작성 적립</td><td style="color:#1f8f44;">+ 500P</td><td>500P</td></tr>
            </tbody>
          </table>
        `;
      } else if (tab === 'profile') {
        content = `
          <h3 style="font-size:18px; margin-bottom:20px;">프로필 관리</h3>
          <div class="form-group"><label>이메일</label><input class="form-control" value="${esc(user.email)}" disabled/></div>
          <div class="form-group"><label>이름</label><input class="form-control" id="pName" value="${esc(user.name)}"/></div>
          <div class="form-group"><label>닉네임</label><input class="form-control" placeholder="표시할 닉네임"/></div>
          <div class="form-group"><label>휴대폰</label><input class="form-control" placeholder="010-0000-0000"/></div>
          <div class="form-group"><label>생년월일</label><input type="date" class="form-control"/></div>
          <button class="btn btn-primary" id="btnSave">저장</button>
        `;
      } else if (tab === 'addr') {
        content = `
          <h3 style="font-size:18px; margin-bottom:20px;">배송지 관리</h3>
          <div style="border:1px solid #eee; border-radius:8px; padding:20px;">
            <div style="display:flex; justify-content:space-between; margin-bottom:8px;"><strong>${esc(user.name)}</strong><span class="chip active" style="padding:2px 10px; font-size:11px;">기본</span></div>
            <div>010-0000-0000</div>
            <div class="muted">서울시 강남구 테헤란로 152 강남파이낸스센터</div>
          </div>
          <button class="btn btn-outline" style="margin-top:12px;" onclick="toast('배송지 추가 (목업)')">+ 새 배송지 추가</button>
        `;
      } else if (tab === 'review') {
        content = `
          <h3 style="font-size:18px; margin-bottom:20px;">리뷰 관리</h3>
          <div style="display:flex; gap:12px; margin-bottom:20px;">
            <button class="chip active">작성 가능한 리뷰</button>
            <button class="chip">내가 쓴 리뷰</button>
          </div>
          <p class="muted">주문한 상품에 대한 리뷰를 작성하고 최대 1,000P 적립금을 받아보세요.</p>
        `;
      }

      setSafeHTML(view, `<div class="mp-layout">${sideNav}<div>${content}</div></div>`);
      AMP.track('[MyPage] Tab Viewed', { tab });

      const btnSave = document.getElementById('btnSave');
      if (btnSave) btnSave.onclick = () => {
        const updated = { ...user, name: document.getElementById('pName').value.trim() };
        MUSICM.setUser(updated);
        AMP.track('[MyPage] Profile Saved');
        toast('프로필이 저장되었습니다');
      };
    }
  </script>
</body>
</html>
